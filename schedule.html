<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Photos</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial; margin:40px auto; max-width:760px; padding:0 20px; }
    h1 { font-size:20px; margin-bottom:24px; text-align:center; }
    .photo { margin-bottom:28px; text-align:center; }
    .photo h2 { font-size:18px; margin:0 0 8px 0; }
  .photo img { max-width:100%; height:auto; border:2px solid #ccc; border-radius:6px; display:block; margin:0 auto 8px; box-shadow:0 1px 2px rgba(0,0,0,0.04); }
    .desc { color:#333; font-size:15px; margin:0; }
    
  </style>
</head>
<body>
  <h1>Photos</h1>
  <p style="text-align:center; margin-top:8px; margin-bottom:20px;"><a href="index.html">Back to index</a></p>

  <section class="photo">
    <h2>Image 1</h2>
    <img src="family_arizona.jpeg" alt="Image 1" onerror="this.style.display='none'">
    <p class="desc">This photo is from me and my family in Arizona</p>
  </section>

  <section class="photo">
    <h2>Image 2</h2>
    <img src="Friends.jpeg" alt="Image 2" onerror="this.style.display='none'">
    <p class="desc">This is a photo of me and some of my friends</p>
  </section>

</body>
</html>
